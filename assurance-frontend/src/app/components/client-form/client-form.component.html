<div class="card">
  <div class="card-body">
    <h4>{{ id ? 'Modify client' : 'New client' }}</h4>
    <div class="mb-2"><label class="form-label">Name</label><input class="form-control" [(ngModel)]="client.nom"></div>
    <div class="mb-3"><label class="form-label">Email</label><input class="form-control" [(ngModel)]="client.email"></div>
    <button class="btn btn-success" (click)="save()">Register</button>
  </div>
</div>
