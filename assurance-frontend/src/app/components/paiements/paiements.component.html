<div class="card mb-3">
  <div class="card-body">
    <h4>Paiements - Contrat #{{ contratId }}</h4>
    <div class="row g-2 align-items-end">
      <div class="col-md-3"><input type="date" class="form-control" [(ngModel)]="payload.date"></div>
      <div class="col-md-3"><input type="number" class="form-control" placeholder="Montant" [(ngModel)]="payload.montant"></div>
      <div class="col-md-3">
        <select class="form-select" [(ngModel)]="payload.type">
          <option>MONTHLY PAYMENT</option><option>ANNUAL PAYMENT</option><option>EXCEPTIONAL PAYMENT</option>
        </select>
      </div>
      <div class="col-md-3"><button class="btn btn-success w-100" (click)="add()">Add paiement</button></div>
    </div>
  </div>
</div>
<div class="alert alert-info">Total paid: {{ totalPaye }} | Still to pay: {{ resteAPayer }}</div>
<table class="table table-sm table-striped">
  <thead><tr><th>ID</th><th>Date</th><th>Amount</th><th>Type</th></tr></thead>
  <tbody><tr *ngFor="let p of paiements"><td>{{ p.id }}</td><td>{{ p.date }}</td><td>{{ p.montant }}</td><td>{{ p.type }}</td></tr></tbody>
</table>
